        <label for="password" style="text-align: center;">Password:</label><br>

        <button style="background-color:grey ;color: white;" onclick="window.location.href='admin_panel.html'">Login</button><br>
    </div>
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === "admin" && password === "admin123") {
                alert("Login successful!");
